<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Gratuito | Full Sales</title>
    <link rel="icon" type="image/png" href="ÍCONE---Full-Sales.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            background-color: #0a0a0a;
        }

        body {
            background-image: url('background%20fss.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .logo {
            max-width: 260px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.4rem, 2.6vw, 2.4rem);
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: 0.5px;
            max-width: 1000px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        h1 span {
            color: #E31E3A;
        }

        .calendar-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .calendar-container iframe {
            width: 100%;
            min-height: 720px;
            border: none;
            display: block;
        }

        @media (max-width: 600px) {
            .logo {
                max-width: 200px;
                margin-bottom: 28px;
            }

            .overlay {
                padding: 24px 14px 40px;
            }

            .calendar-container iframe {
                min-height: 820px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <img src="LOGO-(Branco)---Full-Sales.png" alt="Full Sales" class="logo">

        <h1>
            Diagnóstico exclusivo para empresários que desejam <span>escalar seus processos comerciais</span>.
        </h1>

        <div class="calendar-container">
            <iframe
                src="https://api.leadconnectorhq.com/widget/booking/6cQkBgUm32kbubL9ynaP"
                scrolling="no"
                id="6cQkBgUm32kbubL9ynaP_1777402675418">
            </iframe>
        </div>
    </div>

    <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
</body>
</html>
